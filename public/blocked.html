<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yas Live — Réservé aux clients Yas</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/assets/yas-logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Figtree", sans-serif;
    background:
      radial-gradient(700px 380px at 92% -6%, #F1F5FD, transparent 65%),
      radial-gradient(600px 420px at -8% 106%, #FFF5CB, transparent 55%),
      #fff;
    color: #1A1A1A; min-height: 100dvh;
    display: grid; place-items: center; padding: 24px; text-align: center;
  }
  img { height: 96px; margin: 0 auto 22px; display: block; }
  h1 { font-weight: 900; font-size: clamp(24px, 6vw, 36px); color: #00377D; }
  p { color: #4A6798; font-weight: 500; margin-top: 12px; max-width: 460px; line-height: 1.6; }
  .tip {
    display: inline-block; margin-top: 22px;
    background: #FFF5CB; border: 2px dashed #FFD100; border-radius: 16px;
    padding: 14px 20px; color: #00377D; font-weight: 700; font-size: 14.5px; max-width: 460px;
  }
</style>
</head>
<body>
<div>
  <img src="/assets/yas-logo.svg" alt="Yas Comores">
  <h1>Réservé aux clients Yas 📶</h1>
  <p>Cette diffusion est accessible uniquement depuis le réseau Yas. Votre connexion actuelle passe par un autre opérateur.</p>
  <span class="tip">💡 Désactivez le Wi-Fi et connectez-vous en données mobiles avec votre puce Yas — et dis Yas !</span>
</div>
</body>
</html>
