<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Yas Live — Dis Yas !</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/assets/yas-logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --yas-navy: #00377D;        /* --cb-brand on yas.km */
    --yas-navy-logo: #123274;   /* navy from the official logo */
    --yas-yellow: #FFD100;
    --yas-yellow-soft: #FFF5CB;
    --yas-sky: #D3E2FA;
    --yas-sky-bg: #F1F5FD;
    --yas-sky-bg-2: #F6F9FE;
    --yas-pink: #EE2C82;
    --yas-ink: #1A1A1A;         /* --cb-text on yas.km */
    --font: "Figtree", sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background:
      radial-gradient(800px 420px at 90% -8%, var(--yas-sky-bg), transparent 65%),
      radial-gradient(700px 500px at -10% 108%, var(--yas-yellow-soft), transparent 55%),
      #fff;
    color: var(--yas-ink);
    min-height: 100dvh;
    display: flex; flex-direction: column;
    user-select: none; -webkit-user-select: none;
  }
  .shell { width: 100%; max-width: 1080px; margin: 0 auto; padding: 14px clamp(14px, 3vw, 28px) 0; flex: 1; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0 20px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo img { height: 52px; width: auto; display: block; -webkit-user-drag: none; }
  .logo-sub {
    font-weight: 800; font-size: 19px; color: var(--yas-navy); line-height: 1;
    border-left: 2px solid var(--yas-sky); padding-left: 12px;
  }
  .logo-sub small { display: block; font-weight: 600; font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; color: #7A93BC; margin-top: 4px; }
  .private-pill {
    font-size: 12.5px; font-weight: 700; color: var(--yas-navy);
    border: 2px solid var(--yas-sky); background: var(--yas-sky-bg);
    border-radius: 999px; padding: 8px 15px;
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
  }
  .private-pill::before { content: "🔒"; font-size: 12px; }

  .player-card {
    background: #fff;
    border: 1px solid #E7E7E8;
    border-radius: 24px; padding: 10px;
    box-shadow: 0 24px 48px -16px rgba(0,55,125,.18);
    animation: riseIn .6s cubic-bezier(.2,.9,.3,1) both;
  }
  .player-card:fullscreen { border-radius: 0; display: flex; flex-direction: column; justify-content: center; }
  /* Plein écran de secours (iPhone, environnements sans Fullscreen API) :
     lecteur bord à bord sur fond noir, contrôles en surimpression */
  .player-card.fake-fs {
    position: fixed; inset: 0; z-index: 999; margin: 0; padding: 0;
    border: none; border-radius: 0; background: #000; box-shadow: none;
    animation: none; /* l'animation d'entrée (fill both) écraserait la rotation */
  }
  .player-card.fake-fs .player-frame { position: absolute; inset: 0; aspect-ratio: auto; border-radius: 0; }
  .player-card.fake-fs .player-meta {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 6;
    padding: 14px calc(16px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
    background: linear-gradient(transparent, rgba(0,0,0,.65));
  }
  .player-card.fake-fs #now-title { color: #fff; }
  /* iPhone tenu en portrait : rotation du lecteur pour un plein écran paysage */
  @media (orientation: portrait) {
    .player-card.fake-fs {
      inset: auto; top: 0; left: 0;
      width: 100vh; width: 100dvh;
      height: 100vw; height: 100dvw;
      transform: rotate(90deg) translateY(-100%);
      transform-origin: top left;
    }
  }
  .player-frame { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 16px; overflow: hidden; background: var(--yas-navy-logo); }
  .player-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }

  /* Shield: guests never touch the YouTube player directly */
  .shield { position: absolute; inset: 0; z-index: 2; cursor: pointer; }

  .big-play {
    position: absolute; z-index: 3; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 84px; height: 84px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--yas-yellow); color: var(--yas-navy);
    display: grid; place-items: center;
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
    transition: transform .18s;
  }
  .big-play:hover { transform: translate(-50%, -50%) scale(1.08); }
  .big-play svg { width: 30px; height: 30px; margin-left: 4px; }
  .big-play.hidden { display: none; }

  .waiting {
    position: absolute; inset: 0; z-index: 4; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    text-align: center; padding: 24px;
    background: linear-gradient(160deg, var(--yas-sky-bg-2), var(--yas-sky-bg));
    color: var(--yas-navy);
  }
  .waiting.show { display: flex; }
  .waiting img { height: 68px; animation: bob 2.4s ease-in-out infinite; -webkit-user-drag: none; }
  .waiting h2 { font-weight: 900; font-size: clamp(19px, 4.5vw, 27px); }
  .waiting p { color: #4A6798; font-size: 14.5px; max-width: 400px; line-height: 1.55; font-weight: 500; }

  .player-meta { display: flex; align-items: center; gap: 12px; padding: 13px 8px 6px; flex-wrap: wrap; }
  .live-pill {
    display: none; align-items: center; gap: 8px;
    font-weight: 800; font-size: 13px; color: #fff;
    background: var(--yas-pink); border-radius: 999px; padding: 6px 15px;
  }
  .live-pill.show { display: inline-flex; }
  .live-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; animation: pulse 1.4s ease-in-out infinite; }
  #now-title { font-weight: 800; font-size: 16.5px; color: var(--yas-navy); flex: 1; min-width: 140px; }

  .controls { display: flex; gap: 8px; }
  .ctrl {
    width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--yas-navy); color: #fff;
    display: grid; place-items: center;
    transition: transform .15s, background .15s;
  }
  .ctrl:hover { transform: translateY(-2px); background: var(--yas-navy-logo); }
  .ctrl svg { width: 18px; height: 18px; }
  .ctrl.off { background: #B9C6DC; }

  footer {
    margin-top: auto; text-align: center; padding: 34px 20px 26px;
    background: linear-gradient(180deg, transparent, var(--yas-sky-bg-2) 40%);
  }
  footer .slogan {
    display: inline-block; font-weight: 900; font-size: 17px; color: var(--yas-navy);
    background: var(--yas-yellow); border-radius: 999px; padding: 7px 20px; margin-bottom: 10px;
    transform: rotate(-1.5deg);
  }
  footer p { color: #7A93BC; font-size: 12.5px; font-weight: 500; }

  @keyframes riseIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.7); } }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">
      <img src="/assets/yas-logo.svg" alt="Yas Comores" draggable="false">
      <span class="logo-sub">Live<small>Comores</small></span>
    </div>
    <span class="private-pill">Diffusion privée</span>
  </header>

  <div class="player-card" id="player-card">
    <div class="player-frame" id="player-frame">
      <div id="yt-host"></div>
      <div class="shield" id="shield"></div>
      <button class="big-play hidden" id="big-play" aria-label="Lire">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <div class="waiting show" id="waiting">
        <img src="/assets/yas-logo.svg" alt="" draggable="false">
        <h2>Le direct n'a pas encore commencé</h2>
        <p>Restez sur cette page — la diffusion démarrera automatiquement dès qu'elle sera lancée.</p>
      </div>
    </div>
    <div class="player-meta">
      <span class="live-pill" id="live-pill"><span class="dot"></span>EN DIRECT</span>
      <span id="now-title">Yas Live</span>
      <div class="controls">
        <button class="ctrl" id="btn-play" aria-label="Lire / Pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><path id="play-icon" d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl" id="btn-mute" aria-label="Son">
          <svg viewBox="0 0 24 24" fill="currentColor"><path id="mute-icon" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
        <button class="ctrl" id="btn-fs" aria-label="Plein écran">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<footer>
  <span class="slogan">Dis Yas !</span>
  <p>Yas Live · Diffusion réservée aux invités — merci de ne pas partager ce lien.</p>
</footer>

<script>
  // Anti-partage : pas de menu contextuel, pas de glisser-déposer
  document.addEventListener('contextmenu', (e) => e.preventDefault());
  document.addEventListener('dragstart', (e) => e.preventDefault());

  const token = location.pathname.split('/')[2] || '';
  const waiting = document.getElementById('waiting');
  const livePill = document.getElementById('live-pill');
  const nowTitle = document.getElementById('now-title');
  const bigPlay = document.getElementById('big-play');
  const playIcon = document.getElementById('play-icon');
  const muteIcon = document.getElementById('mute-icon');
  const ICON_PLAY = 'M8 5v14l11-7z';
  const ICON_PAUSE = 'M6 19h4V5H6v14zm8-14v14h4V5h-4z';
  const ICON_SOUND = 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1-3.29-2.5-4.03v8.05c1.5-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
  const ICON_MUTED = 'M16.5 12c0-1.77-1-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';

  let currentId = null;
  let ytPlayer = null;
  let ytApiReady = false;
  let pendingId = null;

  window.onYouTubeIframeAPIReady = () => {
    ytApiReady = true;
    if (pendingId) { const id = pendingId; pendingId = null; mountPlayer(id); }
  };

  function mountPlayer(id) {
    if (!ytApiReady) { pendingId = id; return; }
    if (ytPlayer) { ytPlayer.loadVideoById(id); return; }
    ytPlayer = new YT.Player('yt-host', {
      videoId: id,
      playerVars: { autoplay: 0, controls: 0, disablekb: 1, rel: 0, playsinline: 1, iv_load_policy: 3, fs: 0 },
      events: {
        onReady: () => syncButtons(),
        onStateChange: () => syncButtons()
      }
    });
  }

  function isPlaying() {
    return ytPlayer && typeof ytPlayer.getPlayerState === 'function' && ytPlayer.getPlayerState() === 1;
  }

  function syncButtons() {
    const playing = isPlaying();
    playIcon.setAttribute('d', playing ? ICON_PAUSE : ICON_PLAY);
    bigPlay.classList.toggle('hidden', playing || waiting.classList.contains('show'));
    if (ytPlayer && typeof ytPlayer.isMuted === 'function') {
      muteIcon.setAttribute('d', ytPlayer.isMuted() ? ICON_MUTED : ICON_SOUND);
      document.getElementById('btn-mute').classList.toggle('off', ytPlayer.isMuted());
    }
  }

  function togglePlay() {
    if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
    isPlaying() ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
  }

  document.getElementById('shield').addEventListener('click', togglePlay);
  bigPlay.addEventListener('click', togglePlay);
  document.getElementById('btn-play').addEventListener('click', togglePlay);

  document.getElementById('btn-mute').addEventListener('click', () => {
    if (!ytPlayer || typeof ytPlayer.isMuted !== 'function') return;
    ytPlayer.isMuted() ? ytPlayer.unMute() : ytPlayer.mute();
    setTimeout(syncButtons, 100);
  });

  const card = document.getElementById('player-card');

  const realFullscreenActive = () => !!(document.fullscreenElement || document.webkitFullscreenElement);
  const enterFake = () => { card.classList.add('fake-fs'); document.body.style.overflow = 'hidden'; };
  const exitFake = () => { card.classList.remove('fake-fs'); document.body.style.overflow = ''; };

  async function toggleFullscreen() {
    if (realFullscreenActive()) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      return;
    }
    if (card.classList.contains('fake-fs')) { exitFake(); return; }
    // Garde-fou : si l'API Fullscreen ne répond pas (permission en attente,
    // WebView, iPhone…), on bascule sur le plein écran CSS.
    const fallback = setTimeout(() => { if (!realFullscreenActive()) enterFake(); }, 600);
    try {
      if (card.requestFullscreen) {
        await card.requestFullscreen();
        clearTimeout(fallback); exitFake();
        // Paysage automatique quand l'appareil le permet (Android)
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      } else if (card.webkitRequestFullscreen) {
        card.webkitRequestFullscreen(); // pas de promesse : le garde-fou tranche
      } else {
        throw new Error('non supporté');
      }
    } catch {
      clearTimeout(fallback); enterFake();
    }
  }

  document.getElementById('btn-fs').addEventListener('click', toggleFullscreen);
  document.addEventListener('fullscreenchange', () => {
    if (realFullscreenActive()) exitFake();
    else if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && card.classList.contains('fake-fs')) toggleFullscreen();
  });

  async function refresh() {
    try {
      const r = await fetch(`/api/stream?token=${encodeURIComponent(token)}`);
      if (!r.ok) return;
      const s = await r.json();
      if (s.live && s.videoId) {
        if (s.videoId !== currentId) {
          currentId = s.videoId;
          mountPlayer(s.videoId);
        }
        waiting.classList.remove('show');
        livePill.classList.add('show');
      } else {
        currentId = null;
        if (ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
        waiting.classList.add('show');
        livePill.classList.remove('show');
      }
      nowTitle.textContent = s.title || 'Yas Live';
      syncButtons();
    } catch {}
  }

  refresh();
  setInterval(refresh, 12000);
</script>
<script src="https://www.youtube.com/iframe_api" async></script>
</body>
</html>
